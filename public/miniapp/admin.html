<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>XAFEARN Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--b:#1565C0;--bl:#1E88E5;--bd:#0D47A1;--o:#F57C00;--ob:#FFB300;--g:#10B981;--r:#EF4444;--bg:#F0F4FF;--txt:#0D1B3E;--mu:#6B7DB3;--brd:#E0E8FF}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}

/* LOGIN */
#loginPage{position:fixed;inset:0;background:linear-gradient(135deg,var(--bd),var(--b));display:flex;align-items:center;justify-content:center;padding:24px;z-index:99}
.lcard{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:340px}
.llogo{font-family:'Outfit',sans-serif;font-weight:900;font-size:24px;color:var(--bd);text-align:center;margin-bottom:3px}
.llogo em{color:var(--o);font-style:normal}
.lsub{text-align:center;font-size:12px;color:var(--mu);margin-bottom:20px}
.fg{margin-bottom:12px}
.fl{font-size:11px;font-weight:600;color:var(--mu);margin-bottom:4px;display:block}
.fi{width:100%;padding:12px 14px;border:2px solid var(--brd);border-radius:11px;font-family:'Space Grotesk',sans-serif;font-size:14px;background:#fff;color:var(--txt);outline:none}
.fi:focus{border-color:var(--bl)}

/* BOUTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:.18s}
.btn:active{transform:scale(.97)}
.bb{background:linear-gradient(135deg,var(--b),var(--bl));color:#fff}
.bo{background:linear-gradient(135deg,var(--o),var(--ob));color:#fff}
.bg2{background:linear-gradient(135deg,#059669,var(--g));color:#fff}
.br2{background:linear-gradient(135deg,#DC2626,var(--r));color:#fff}
.bgh{background:var(--bg);color:var(--txt);border:1px solid var(--brd)}
.bs{padding:8px 12px;font-size:12px;border-radius:10px;width:auto;display:inline-flex;align-items:center;justify-content:center;gap:4px}

/* APP */
#app{display:none}
.hd{background:linear-gradient(135deg,var(--bd),var(--b));padding:13px 16px;display:flex;justify-content:space-between;align-items:center}
.hlogo{font-family:'Outfit',sans-serif;font-weight:900;font-size:17px;color:#fff}
.hlogo em{color:var(--ob);font-style:normal}
.dco{background:rgba(255,255,255,.15);color:#fff;border:none;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer}

/* TABS */
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--brd);position:sticky;top:0;z-index:10;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;flex:1;min-width:60px;padding:11px 6px 8px;border:none;background:none;cursor:pointer;font-family:'Space Grotesk',sans-serif;font-size:10px;font-weight:600;color:var(--mu);position:relative;display:flex;flex-direction:column;align-items:center;gap:2px}
.tab .ic{font-size:17px}
.tab.on{color:var(--b)}
.tab.on::after{content:'';position:absolute;bottom:0;left:10%;right:10%;height:3px;background:linear-gradient(90deg,var(--b),var(--o));border-radius:3px 3px 0 0}
.badge{position:absolute;top:5px;right:5px;background:var(--r);color:#fff;font-size:8px;font-weight:700;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center}

/* CONTENT */
.content{padding:12px 12px 80px}
.pg{display:none}
.pg.on{display:block}

/* CARD */
.card{background:#fff;border-radius:14px;padding:14px;box-shadow:0 2px 10px rgba(21,101,192,.08);margin-bottom:12px;border:1px solid var(--brd)}

/* ANNONCE ROW */
.arow{background:#fff;border:1px solid var(--brd);border-radius:13px;overflow:hidden;margin-bottom:10px}
.arow-photo{width:100%;height:150px;object-fit:cover}
.arow-body{padding:13px}
.arow-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.arow-titre{font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;flex:1;margin-right:8px}
.pack-badge{font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.pb-basic{background:#EFF6FF;color:var(--b)}
.pb-standard{background:#FFF7ED;color:var(--o)}
.pb-premium{background:linear-gradient(135deg,var(--o),var(--ob));color:#fff}
.arow-info{font-size:11px;color:var(--mu);line-height:1.8;margin-bottom:10px}
.arow-info strong{color:var(--txt)}
.sbdg{display:inline-block;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px}
.sbdg-p{background:#FEF3C7;color:#92400E}
.sbdg-ok{background:#D1FAE5;color:#065F46}
.sbdg-r{background:#FEE2E2;color:#991B1B}
.btn-row{display:flex;gap:7px;flex-wrap:wrap}

/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:14px}
.sstat{background:#fff;border-radius:13px;padding:13px;border:1px solid var(--brd);text-align:center}
.sv{font-family:'Outfit',sans-serif;font-size:22px;font-weight:700;color:var(--bd)}
.sl{font-size:10px;color:var(--mu)}

/* USERS */
.urow{display:flex;align-items:center;padding:11px;background:#fff;border-radius:11px;margin-bottom:8px;border:1px solid var(--brd);cursor:pointer;transition:.18s}
.urow:active{background:var(--bg)}
.uav{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--b),var(--bl));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0;margin-right:10px}
.uinfo{flex:1}
.unom{font-weight:600;font-size:13px}
.usub{font-size:10px;color:var(--mu)}

/* BROADCAST */
.msg-box{width:100%;padding:10px 12px;border:2px solid var(--brd);border-radius:11px;font-family:'Space Grotesk',sans-serif;font-size:13px;resize:none;outline:none;margin-bottom:10px;height:80px}
.msg-box:focus{border-color:var(--bl)}

/* TOAST */
.toast{position:fixed;bottom:16px;left:10px;right:10px;padding:12px 16px;border-radius:12px;font-size:12px;font-weight:600;text-align:center;transform:translateY(130%);transition:transform .3s;z-index:999}
.toast.on{transform:translateY(0)}
.toast.ok{background:linear-gradient(135deg,#059669,var(--g));color:#fff}
.toast.er{background:linear-gradient(135deg,#DC2626,var(--r));color:#fff}
.toast.in{background:linear-gradient(135deg,var(--bd),var(--b));color:#fff}

/* EMPTY */
.empty{text-align:center;padding:32px 16px;color:var(--mu)}
.spin{width:28px;height:28px;border:3px solid var(--brd);border-top-color:var(--b);border-radius:50%;animation:doSpin .8s linear infinite;margin:0 auto 8px}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;z-index:100}
.ov.on{display:flex}
.mo{background:#fff;border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-height:88vh;overflow-y:auto;animation:slideUp .3s ease}
.mo-title{font-family:'Outfit',sans-serif;font-size:17px;font-weight:900;margin-bottom:14px}
.mcl{float:right;background:var(--bg);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:14px}

@keyframes doSpin{to{transform:rotate(360deg)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="lcard">
    <div class="llogo">X<em>A</em>FEARN</div>
    <div class="lsub">Panel Administrateur</div>
    <div class="fg">
      <label class="fl">Code admin</label>
      <input class="fi" type="password" id="adminCode" placeholder="••••••••"/>
    </div>
    <button class="btn bb" onclick="doLogin()">🔐 Se connecter</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="hd">
    <div class="hlogo">X<em>A</em>FEARN <span style="font-size:10px;opacity:.6;font-weight:400">Admin</span></div>
    <button class="dco" onclick="logout()">🚪 Déco</button>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="goTab('pend',this)">
      <span class="ic">⏳</span>Attente
      <div class="badge" id="pendBadge">0</div>
    </button>
    <button class="tab" onclick="goTab('all',this)"><span class="ic">📋</span>Toutes</button>
    <button class="tab" onclick="goTab('users',this)"><span class="ic">👥</span>Users</button>
    <button class="tab" onclick="goTab('stats',this)"><span class="ic">📊</span>Stats</button>
    <button class="tab" onclick="goTab('broad',this)"><span class="ic">📢</span>Broadcast</button>
  </div>

  <div class="content">
    <div class="pg on" id="tab-pend">
      <div id="pendList"><div class="empty"><div class="spin"></div>Chargement...</div></div>
    </div>
    <div class="pg" id="tab-all">
      <div style="display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap">
        <button class="btn bgh bs" onclick="loadAll('')">🌍 Tout</button>
        <button class="btn bgh bs" onclick="loadAll('pending')">⏳</button>
        <button class="btn bgh bs" onclick="loadAll('approved')">✅</button>
        <button class="btn bgh bs" onclick="loadAll('rejected')">❌</button>
      </div>
      <div id="allList"><div class="empty"><div class="spin"></div></div></div>
    </div>
    <div class="pg" id="tab-users">
      <div id="usersList"><div class="empty"><div class="spin"></div></div></div>
    </div>
    <div class="pg" id="tab-stats">
      <div id="statsContent"><div class="empty"><div class="spin"></div></div></div>
    </div>
    <div class="pg" id="tab-broad">
      <div class="card">
        <div style="font-family:'Outfit',sans-serif;font-weight:700;font-size:14px;margin-bottom:10px">📢 Message à tous</div>
        <textarea class="msg-box" id="broadMsg" placeholder="Écris ton message..."></textarea>
        <button class="btn bo" onclick="loadBroadUsers()">📋 Voir les numéros</button>
      </div>
      <div id="broadList"></div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toastEl"></div>

<!-- MODAL -->
<div class="ov" id="ov" onclick="closeMo()">
  <div class="mo" onclick="event.stopPropagation()">
    <button class="mcl" onclick="closeMo()">✕</button>
    <div id="moContent"></div>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────
var SB         = "https://xtmmmrajknnadodgrrcu.supabase.co";
var KEY        = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh0bW1tcmFqa25uYWRvZGdycmN1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MzM2NTEsImV4cCI6MjA5NDIwOTY1MX0.0r3JfPL2rgKGWO0iiapV7mb8fI8N3Cmz4M9L1L-zqVw";
var BOT_TOKEN  = "8773996867:AAFkp0NorNeFEigJX3bB-D2S4dY-LuEVrdc";
var CHANNEL    = "@xafearn_money";
var ADMIN_CODE = "XAFEARN2025";
var HDR = {"apikey":KEY,"Authorization":"Bearer "+KEY,"Content-Type":"application/json","Prefer":"return=representation"};

// Cache photos
var photoCache = {};

// ── DB ────────────────────────────────────────────────────
function dbGet(table, params, cb) {
  var qs = params ? "?" + Object.keys(params).map(function(k){ return k+"="+params[k]; }).join("&") : "";
  var xhr = new XMLHttpRequest();
  xhr.open("GET", SB+"/rest/v1/"+table+qs);
  Object.keys(HDR).forEach(function(h){ xhr.setRequestHeader(h,HDR[h]); });
  xhr.onload = function(){
    try{ cb(null, JSON.parse(xhr.responseText)); }catch(e){ cb("Erreur"); }
  };
  xhr.onerror = function(){ cb("Réseau"); };
  xhr.send();
}

function dbPatch(table, params, data, cb) {
  var qs = "?" + Object.keys(params).map(function(k){ return k+"="+params[k]; }).join("&");
  var xhr = new XMLHttpRequest();
  xhr.open("PATCH", SB+"/rest/v1/"+table+qs);
  Object.keys(HDR).forEach(function(h){ xhr.setRequestHeader(h,HDR[h]); });
  xhr.onload = function(){ if(cb) cb(); };
  xhr.onerror = function(){ if(cb) cb(); };
  xhr.send(JSON.stringify(data));
}

// ── UTILS ─────────────────────────────────────────────────
function toast(msg, type) {
  var el = document.getElementById("toastEl");
  el.textContent = msg;
  el.className = "toast on toast-"+(type||"in");
  // Ajouter couleur inline
  if(type==="ok") el.style.background = "linear-gradient(135deg,#059669,#10B981)";
  else if(type==="er") el.style.background = "linear-gradient(135deg,#DC2626,#EF4444)";
  else el.style.background = "linear-gradient(135deg,#0D47A1,#1565C0)";
  el.style.color = "#fff";
  el.className = "toast on";
  setTimeout(function(){ el.className = "toast"; }, 3000);
}

function closeMo() { document.getElementById("ov").classList.remove("on"); }

function showMo(html) {
  document.getElementById("moContent").innerHTML = html;
  document.getElementById("ov").classList.add("on");
}

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── AUTH ──────────────────────────────────────────────────
function doLogin() {
  var code = (document.getElementById("adminCode").value||"").trim();
  if (code === ADMIN_CODE) {
    try{ localStorage.setItem("xa_admin","1"); }catch(e){}
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("app").style.display = "block";
    loadPend();
  } else {
    toast("Code incorrect ❌","er");
  }
}

document.addEventListener("keydown", function(e){
  if (e.key === "Enter") {
    if (document.getElementById("loginPage").style.display !== "none") doLogin();
  }
});

function logout() {
  try{ localStorage.removeItem("xa_admin"); }catch(e){}
  location.reload();
}

// ── TABS ──────────────────────────────────────────────────
function goTab(name, btn) {
  document.querySelectorAll(".pg").forEach(function(p){ p.classList.remove("on"); });
  document.querySelectorAll(".tab").forEach(function(b){ b.classList.remove("on"); });
  document.getElementById("tab-"+name).classList.add("on");
  btn.classList.add("on");
  if (name === "pend")  loadPend();
  if (name === "all")   loadAll("");
  if (name === "users") loadUsers();
  if (name === "stats") loadStats();
}

// ── PACK BADGE ────────────────────────────────────────────
function packBadge(p) {
  var cls = {basic:"pb-basic",standard:"pb-standard",premium:"pb-premium"};
  var lbl = {basic:"🥉 Basique",standard:"🥈 Standard",premium:"👑 Premium"};
  return '<span class="pack-badge '+(cls[p]||"pb-basic")+'">'+(lbl[p]||p)+'</span>';
}

// ── ANNONCE CARD ──────────────────────────────────────────
function renderAnn(a, withActions) {
  var statusCls = {pending:"sbdg-p",approved:"sbdg-ok",rejected:"sbdg-r"};
  var statusLbl = {pending:"⏳ En attente",approved:"✅ Approuvée",rejected:"❌ Rejetée"};
  var exp = a.expires_at ? new Date(a.expires_at).toLocaleDateString("fr") : "—";
  var hasPhoto = a.photo_data && a.photo_data.length > 100;
  if (hasPhoto) photoCache[a.id] = a.photo_data;

  var photoHtml = hasPhoto
    ? '<img src="'+a.photo_data+'" class="arow-photo" alt="photo"/>'
    : "";

  var actionsHtml = "";
  if (withActions !== false) {
    if (a.status === "pending") {
      actionsHtml =
        '<button class="btn bg2 bs" onclick="approveAnn('+a.id+')">✅ Approuver</button>' +
        '<button class="btn br2 bs" onclick="rejectAnn('+a.id+')">❌ Rejeter</button>' +
        '<button class="btn bo bs" onclick="shareToChan('+a.id+')">📤 Partager</button>';
    } else if (a.status === "approved") {
      actionsHtml =
        '<button class="btn bb bs" onclick="shareToChan('+a.id+')">📤 Repartager</button>' +
        '<button class="btn br2 bs" onclick="rejectAnn('+a.id+')">❌ Désactiver</button>';
    }
  }

  return '<div class="arow">' +
    photoHtml +
    '<div class="arow-body">' +
      '<div class="arow-top">' +
        '<div class="arow-titre">'+esc(a.titre||"(sans titre)")+'</div>' +
        packBadge(a.pack) +
      '</div>' +
      '<div class="arow-info">' +
        '<span class="sbdg '+(statusCls[a.status]||"sbdg-p")+'">'+(statusLbl[a.status]||a.status)+'</span><br>' +
        '📝 '+esc(a.description||"")+'<br>' +
        '📂 <strong>'+esc(a.categorie||"—")+'</strong>' +
        (a.prix_annonce ? ' · 💰 <strong>'+esc(a.prix_annonce)+'</strong>' : '') +
        ' · 📍 '+esc(a.pays||"—")+'<br>' +
        '👤 <strong>'+esc(a.nom_user||"—")+'</strong> · 📱 '+esc(a.contact||"—")+'<br>' +
        '💳 Réf : <strong>'+esc(a.ref_paiement||"—")+'</strong> · '+esc(String(a.montant_paye||"?"))+'F<br>' +
        '📅 Expire : '+exp +
      '</div>' +
      '<div class="btn-row">'+actionsHtml+'</div>' +
    '</div>' +
  '</div>';
}

// ── EN ATTENTE ────────────────────────────────────────────
function loadPend() {
  var list = document.getElementById("pendList");
  list.innerHTML = '<div class="empty"><div class="spin"></div>Chargement...</div>';
  dbGet("miniapp_annonces", {status:"eq.pending",order:"created_at.asc"}, function(err, data) {
    document.getElementById("pendBadge").textContent = data ? data.length : 0;
    if (err || !data || !data.length) {
      list.innerHTML = '<div class="empty"><div style="font-size:34px;margin-bottom:8px">✅</div>Aucune annonce en attente !</div>';
      return;
    }
    list.innerHTML = data.map(function(a){ return renderAnn(a, true); }).join("");
  });
}

// ── TOUTES ────────────────────────────────────────────────
function loadAll(status) {
  var list = document.getElementById("allList");
  list.innerHTML = '<div class="empty"><div class="spin"></div></div>';
  var p = {order:"created_at.desc",limit:"80"};
  if (status) p["status"] = "eq."+status;
  dbGet("miniapp_annonces", p, function(err, data) {
    if (err || !data || !data.length) {
      list.innerHTML = '<div class="empty">Aucune annonce trouvée</div>';
      return;
    }
    list.innerHTML = '<div style="font-size:11px;color:var(--mu);margin-bottom:10px">'+data.length+' annonce(s)</div>' +
      data.map(function(a){ return renderAnn(a, true); }).join("");
  });
}

// ── ACTIONS ───────────────────────────────────────────────
function approveAnn(id) {
  dbPatch("miniapp_annonces", {"id":"eq."+id}, {"status":"approved"}, function() {
    toast("Annonce approuvée ✅","ok");
    loadPend();
  });
}

function rejectAnn(id) {
  dbPatch("miniapp_annonces", {"id":"eq."+id}, {"status":"rejected"}, function() {
    toast("Annonce rejetée","er");
    loadPend();
  });
}

function shareToChan(id) {

  dbGet("miniapp_annonces", {"id":"eq."+id}, function(err, data) {
    if (err || !data || !data[0]) { toast("Annonce introuvable","er"); return; }

    var isPrem = a.pack === "premium";

    var catEmoji = {Vente:"🛒",Services:"🔧",Emploi:"💼",Immobilier:"🏠","Véhicules":"🚗",Autre:"📦"};
    var ico = catEmoji[a.categorie] || "📢";

    var msg =
      (isPrem
        ? "╔══════════════════════╗\n👑   ANNONCE PREMIUM   👑\n╚══════════════════════╝\n\n"

          : "📢 NOUVELLE ANNONCE\n━━━━━━━━━━━━━━━━━━━━━━\n\n") +
      ico + " " + (a.titre||"").toUpperCase() + "\n\n" +
      "📝 " + (a.description||"") + "\n\n" +
      "━━━━━━━━━━━━━━━━━━━━━━\n" +
      (a.prix_annonce ? "💰 Prix : " + a.prix_annonce + "\n" : "") +
      "📂 Catégorie : " + (a.categorie||"") + "\n" +
      "📍 Lieu : " + (a.pays||"") + "\n" +
      "━━━━━━━━━━━━━━━━━━━━━━\n" +
      "📱 Contact WhatsApp :\n" +
      "👉 wa.me/" + (a.contact||"").replace(/\D/g,"") + "\n" +
      "━━━━━━━━━━━━━━━━━━━━━━\n\n" +
      "🌐 Publie ta propre annonce :\n" +
      "👉 t.me/xafearn_bot" +
      (isPrem ? "\n\n⭐ Annonce mise en avant par XAFEARN" : "");

    var hasPhoto = a.photo_data && a.photo_data.length > 100;

    if (hasPhoto) {
      // Envoyer avec photo
      var b64 = a.photo_data.split(",")[1] || a.photo_data;
      var binary = atob(b64);
      var arr = new Uint8Array(binary.length);
      for (var i=0; i<binary.length; i++) arr[i] = binary.charCodeAt(i);
      var blob = new Blob([arr], {type:"image/jpeg"});
      var fd = new FormData();
      fd.append("chat_id", CHANNEL);
      fd.append("photo", blob, "annonce.jpg");
      fd.append("caption", msg);
      fetch("https://api.telegram.org/bot"+BOT_TOKEN+"/sendPhoto", {method:"POST",body:fd})
        .then(function(r){ return r.json(); })
        .then(function(res) {
          if (res.ok) {
            dbPatch("miniapp_annonces",{"id":"eq."+id},{"status":"approved"},function(){});
            toast("Partagé avec photo ✅","ok");
            loadPend();
          } else { toast("Erreur Telegram : "+(res.description||""),"er"); }
        }).catch(function(){ toast("Erreur connexion","er"); });
    } else {
      // Envoyer texte seul
      fetch("https://api.telegram.org/bot"+BOT_TOKEN+"/sendMessage", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({chat_id:CHANNEL, text:msg})
      }).then(function(r){ return r.json(); })
        .then(function(res) {
          if (res.ok) {
            dbPatch("miniapp_annonces",{"id":"eq."+id},{"status":"approved"},function(){});
            toast("Partagé dans "+CHANNEL+" ✅","ok");
            loadPend();
          } else { toast("Erreur Telegram : "+(res.description||""),"er"); }
        }).catch(function(){ toast("Erreur connexion","er"); });
    }
  });
}

// ── UTILISATEURS ──────────────────────────────────────────
function loadUsers() {
  var list = document.getElementById("usersList");
  list.innerHTML = '<div class="empty"><div class="spin"></div></div>';
  dbGet("miniapp_users", {order:"created_at.desc"}, function(err, data) {
    if (err || !data || !data.length) {
      list.innerHTML = '<div class="empty">Aucun utilisateur</div>';
      return;
    }
    var html = '<div style="font-size:11px;color:var(--mu);margin-bottom:10px">'+data.length+' utilisateur(s) inscrits</div>';
    data.forEach(function(u, idx) {
      var ini = (u.nom||"?")[0].toUpperCase();
      html +=
        '<div class="urow" onclick="showUser('+idx+')" data-uid="'+u.id+'">' +
          '<div class="uav">'+ini+'</div>' +
          '<div class="uinfo">' +
            '<div class="unom">'+esc(u.nom||"—")+'</div>' +
            '<div class="usub">📱 '+esc(u.telephone||"—")+' · 📍 '+esc(u.pays||"—")+'</div>' +
            '<div class="usub">Inscrit le '+new Date(u.created_at).toLocaleDateString("fr")+'</div>' +
          '</div>' +
          '<div style="color:var(--mu);font-size:18px">›</div>' +
        '</div>';
    });
    list.innerHTML = html;
    // Stocker les users pour le onclick
    window._usersData = data;
  });
}

        '<div style="font-family:Outfit,sans-serif;font-size:17px;font-weight:700">'+esc(u.nom||"—")+'</div>' +
        '<div style="font-size:11px;color:var(--mu);margin-top:2px">'+esc(u.pays||"")+'</div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">' +
        '<div style="background:var(--bg);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--brd)"><div style="font-family:Outfit,sans-serif;font-size:18px;font-weight:700;color:var(--bd)">'+total+'</div><div style="font-size:9px;color:var(--mu)">Annonces</div></div>' +

        '<div style="background:var(--bg);border-radius:10px;padding:10px;text-align:center;border:1px solid var(--brd)"><div style="font-family:Outfit,sans-serif;font-size:18px;font-weight:700;color:var(--o)">'+revenus+'F</div><div style="font-size:9px;color:var(--mu)">Payés</div></div>' +

        (u.telegram_id ? '<br>✈️ Telegram ID : <strong>'+u.telegram_id+'</strong>' : '') +

// ── STATS ─────────────────────────────────────────────────
function loadStats() {
  var c = document.getElementById("statsContent");
  c.innerHTML = '<div class="empty"><div class="spin"></div></div>';
  var done = 0;
  var anns, users;
  function check() {
    done++;
    if (done < 2) return;
    var total   = anns ? anns.length : 0;
    var pending = (anns||[]).filter(function(a){ return a.status==="pending"; }).length;
    var approved= (anns||[]).filter(function(a){ return a.status==="approved"; }).length;
    var rejected= (anns||[]).filter(function(a){ return a.status==="rejected"; }).length;
    var revenus = (anns||[]).filter(function(a){ return a.status==="approved"||a.status==="rejected"; }).reduce(function(s,a){ return s+(a.montant_paye||0); },0);
    var basic   = (anns||[]).filter(function(a){ return a.pack==="basic"; }).length;
    var standard= (anns||[]).filter(function(a){ return a.pack==="standard"; }).length;
    var premium = (anns||[]).filter(function(a){ return a.pack==="premium"; }).length;
    var nb      = users ? users.length : 0;

    c.innerHTML =
      '<div class="sgrid">' +
        '<div class="sstat"><div class="sv">'+nb+'</div><div class="sl">Utilisateurs</div></div>' +
        '<div class="sstat"><div class="sv">'+total+'</div><div class="sl">Annonces totales</div></div>' +
        '<div class="sstat"><div class="sv" style="color:var(--g)">'+approved+'</div><div class="sl">Approuvées</div></div>' +
        '<div class="sstat"><div class="sv" style="color:var(--o)">'+pending+'</div><div class="sl">En attente</div></div>' +
        '<div class="sstat"><div class="sv" style="color:var(--r)">'+rejected+'</div><div class="sl">Rejetées</div></div>' +
        '<div class="sstat"><div class="sv" style="color:var(--g)">'+revenus+'F</div><div class="sl">Revenus</div></div>' +
      '</div>' +
      '<div class="card">' +
        '<div style="font-family:Outfit,sans-serif;font-weight:700;font-size:14px;margin-bottom:12px">📊 Répartition packs</div>' +
        '<div style="font-size:13px;line-height:2.2">' +
          '🥉 Basique 500F : <strong>'+basic+'</strong> → <strong style="color:var(--g)">'+(basic*500)+'F</strong><br>' +
          '🥈 Standard 1000F : <strong>'+standard+'</strong> → <strong style="color:var(--g)">'+(standard*1000)+'F</strong><br>' +
          '👑 Premium 2000F : <strong>'+premium+'</strong> → <strong style="color:var(--g)">'+(premium*2000)+'F</strong>' +
        '</div>' +
      '</div>';
  }
  dbGet("miniapp_annonces", {}, function(err, d){ anns = d||[]; check(); });
  dbGet("miniapp_users",     {}, function(err, d){ users = d||[]; check(); });
}

// ── BROADCAST ─────────────────────────────────────────────
function loadBroadUsers() {
  var msg = document.getElementById("broadMsg").value.trim();
  dbGet("miniapp_users", {order:"created_at.desc"}, function(err, data) {
    if (!data || !data.length) { toast("Aucun utilisateur","er"); return; }
    var html =
      '<div class="card">' +
        '<div style="font-family:Outfit,sans-serif;font-weight:700;font-size:14px;margin-bottom:10px">📋 '+data.length+' contacts</div>' +
        (msg ? '<div style="background:var(--bg);border-radius:9px;padding:10px;font-size:11px;margin-bottom:12px;border:1px solid var(--brd)"><strong>Message :</strong><br>'+esc(msg).replace(/\n/g,"<br>")+'</div>' : '') +
        data.map(function(u) {
          var wa = (u.telephone||"").replace(/\D/g,"");
          var link = "https://wa.me/"+wa+(msg?"?text="+encodeURIComponent(msg):"");
          return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px;background:#fff;border-radius:10px;margin-bottom:6px;border:1px solid var(--brd)">' +
            '<div><div style="font-weight:600;font-size:12px">'+esc(u.nom||"—")+'</div><div style="font-size:10px;color:var(--mu)">'+esc(u.telephone||"—")+'</div></div>' +
            '<a href="'+link+'" target="_blank"><button class="btn bg2 bs">💬 WA</button></a>' +
          '</div>';
        }).join("") +
      '</div>';
    document.getElementById("broadList").innerHTML = html;
  });
}
